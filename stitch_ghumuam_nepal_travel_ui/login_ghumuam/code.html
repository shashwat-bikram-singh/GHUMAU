<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ghumuan - Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-dim": "#cbdbf5",
                    "surface-container-low": "#eff4ff",
                    "inverse-on-surface": "#eaf1ff",
                    "on-primary-fixed-variant": "#004b73",
                    "on-primary-container": "#fdfcff",
                    "error": "#ba1a1a",
                    "primary-fixed": "#cce5ff",
                    "primary-container": "#007bb9",
                    "on-error-container": "#93000a",
                    "background": "#f8f9ff",
                    "on-primary": "#ffffff",
                    "secondary": "#516445",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#dce9ff",
                    "inverse-surface": "#213145",
                    "on-background": "#0b1c30",
                    "secondary-fixed-dim": "#b7cda8",
                    "on-primary-fixed": "#001d31",
                    "tertiary-fixed-dim": "#bfc8ce",
                    "outline-variant": "#bfc7d2",
                    "on-tertiary-container": "#fbfdff",
                    "inverse-primary": "#93ccff",
                    "tertiary-fixed": "#dbe4ea",
                    "surface-container-highest": "#d3e4fe",
                    "on-secondary-fixed": "#0f2008",
                    "tertiary": "#545d62",
                    "surface-tint": "#006398",
                    "tertiary-container": "#6d767b",
                    "surface-container": "#e5eeff",
                    "on-surface": "#0b1c30",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f8f9ff",
                    "secondary-container": "#d0e7c0",
                    "on-secondary-fixed-variant": "#394c2f",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3f4850",
                    "on-tertiary-fixed": "#141d21",
                    "on-secondary-container": "#556849",
                    "on-tertiary-fixed-variant": "#3f484d",
                    "surface-variant": "#d3e4fe",
                    "on-error": "#ffffff",
                    "surface": "#f8f9ff",
                    "secondary-fixed": "#d3e9c3",
                    "primary-fixed-dim": "#93ccff",
                    "error-container": "#ffdad6",
                    "primary": "#006194",
                    "outline": "#707881"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans", "sans-serif"],
                    "body": ["Manrope", "sans-serif"],
                    "label": ["Manrope", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Ambient Shadow to override default heavy shadows */
        .ambient-shadow {
            box-shadow: 0 8px 40px rgba(11, 28, 48, 0.06);
        }
    </style>
</head>
<!-- 
  Logic Application: 
  Navigation and Footer are strictly suppressed here because this is a transactional 
  Login screen, adhering to the "Automatic Suppression" rule to prioritize the canvas.
-->
<body class="bg-background text-on-background font-body antialiased min-h-screen flex items-center justify-center overflow-hidden">
<!-- Atmospheric Background Layer -->
<div class="fixed inset-0 z-0">
<!-- Using a serene Himalayan lake/mountain scene to fit the "Alpine Sanctuary" theme -->
<img alt="" class="w-full h-full object-cover opacity-90" data-alt="Serene morning view of Phewa Lake in Nepal with Annapurna range in the background, calm water reflection, soft mist, atmospheric light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8x8o5T0hulVrECZdMHL9ZK429UW8EfKe6dxSc4bVbk2_akS8-Ti091yWD0kHSLrk6N7ucPv7pNLSupVNe8fIrloxnctHzVrvS82DAyNc4YMwQx8n8QR56qaTTiWOGYN92C9roS6_vQ_7tS4hyWI1Mkt4HUXTlSTFUViNOvlllaqFwWfZeZqUY0FpV-026J579HSx4NqRUkT6PKDibj4zcz7wTXsaPI8tGU4PihoP1Os239BwenY1E4mSXx7BETuMVSRc2_-iazhZZ"/>
<!-- Tonal Overlay to ensure content legibility without harsh darkening -->
<div class="absolute inset-0 bg-gradient-to-br from-surface/40 to-primary-container/20 mix-blend-multiply"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[440px] px-6">
<!-- The Glassmorphism Form Card -->
<div class="bg-surface/70 backdrop-blur-[20px] rounded-xl p-8 sm:p-10 ambient-shadow">
<!-- Brand & Editorial Intro -->
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl sm:text-4xl text-on-surface font-bold tracking-tight mb-3">Ghumuan</h1>
<p class="font-body text-lg text-on-surface-variant font-medium">Return to the stillness.</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Input Group: Email -->
<div>
<label class="block font-label text-sm font-semibold text-on-surface-variant mb-2 ml-1" for="email">Email address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant/50">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<!-- State Styling Applied: surface-container-low to lowest with ghost border on focus -->
<input class="w-full pl-11 pr-4 py-3.5 rounded-lg bg-surface-container-low border-transparent text-on-surface font-body text-base placeholder:text-on-surface-variant/40 focus:bg-surface-container-lowest focus:border-surface-tint/30 focus:ring-2 focus:ring-surface-tint/20 transition-all duration-300" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div>
<div class="flex items-center justify-between mb-2 ml-1 mr-1">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="font-label text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant/50">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<!-- State Styling Applied -->
<input class="w-full pl-11 pr-4 py-3.5 rounded-lg bg-surface-container-low border-transparent text-on-surface font-body text-base placeholder:text-on-surface-variant/40 focus:bg-surface-container-lowest focus:border-surface-tint/30 focus:ring-2 focus:ring-surface-tint/20 transition-all duration-300" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-2">
<button class="w-full py-4 px-6 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline text-base font-bold tracking-wide shadow-[0_4px_14px_rgba(0,97,148,0.25)] hover:shadow-[0_6px_20px_rgba(0,97,148,0.3)] hover:-translate-y-0.5 transition-all duration-300" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Tonal Separation (No-Line Rule applied) -->
<div class="mt-8 mb-6 relative flex items-center justify-center">
<span class="font-label text-xs font-semibold text-on-surface-variant/60 uppercase tracking-wider px-4 bg-transparent">Or continue with</span>
</div>
<!-- Secondary Actions: Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-full bg-surface-container-highest/50 hover:bg-surface-container-high text-primary font-label text-sm font-semibold transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-[18px]">account_circle</span>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-full bg-surface-container-highest/50 hover:bg-surface-container-high text-primary font-label text-sm font-semibold transition-colors duration-200" type="button">
<span class="material-symbols-outlined text-[18px]">ios</span>
                    Apple
                </button>
</div>
<!-- Sign Up Prompt -->
<p class="mt-10 text-center font-label text-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-semibold text-primary hover:text-primary-container ml-1 transition-colors" href="#">Create Account</a>
</p>
</div>
</main>
</body></html>
