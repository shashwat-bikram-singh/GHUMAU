<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ghumuan - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-dim": "#cbdbf5",
                      "surface-container-low": "#eff4ff",
                      "inverse-on-surface": "#eaf1ff",
                      "on-primary-fixed-variant": "#004b73",
                      "on-primary-container": "#fdfcff",
                      "error": "#ba1a1a",
                      "primary-fixed": "#cce5ff",
                      "primary-container": "#007bb9",
                      "on-error-container": "#93000a",
                      "background": "#f8f9ff",
                      "on-primary": "#ffffff",
                      "secondary": "#516445",
                      "on-tertiary": "#ffffff",
                      "surface-container-high": "#dce9ff",
                      "inverse-surface": "#213145",
                      "on-background": "#0b1c30",
                      "secondary-fixed-dim": "#b7cda8",
                      "on-primary-fixed": "#001d31",
                      "tertiary-fixed-dim": "#bfc8ce",
                      "outline-variant": "#bfc7d2",
                      "on-tertiary-container": "#fbfdff",
                      "inverse-primary": "#93ccff",
                      "tertiary-fixed": "#dbe4ea",
                      "surface-container-highest": "#d3e4fe",
                      "on-secondary-fixed": "#0f2008",
                      "tertiary": "#545d62",
                      "surface-tint": "#006398",
                      "tertiary-container": "#6d767b",
                      "surface-container": "#e5eeff",
                      "on-surface": "#0b1c30",
                      "surface-container-lowest": "#ffffff",
                      "surface-bright": "#f8f9ff",
                      "secondary-container": "#d0e7c0",
                      "on-secondary-fixed-variant": "#394c2f",
                      "on-secondary": "#ffffff",
                      "on-surface-variant": "#3f4850",
                      "on-tertiary-fixed": "#141d21",
                      "on-secondary-container": "#556849",
                      "on-tertiary-fixed-variant": "#3f484d",
                      "surface-variant": "#d3e4fe",
                      "on-error": "#ffffff",
                      "surface": "#f8f9ff",
                      "secondary-fixed": "#d3e9c3",
                      "primary-fixed-dim": "#93ccff",
                      "error-container": "#ffdad6",
                      "primary": "#006194",
                      "outline": "#707881"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "1.5rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Plus Jakarta Sans", "sans-serif"
                      ],
                      "body": [
                              "Manrope", "sans-serif"
                      ],
                      "label": [
                              "Manrope", "sans-serif"
                      ]
              }
      },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden">
<!-- Asymmetric Layout Container -->
<main class="flex-1 flex flex-col lg:flex-row w-full h-screen relative">
<!-- Left Side: Atmospheric Imagery & Value Prop -->
<div class="relative hidden lg:flex lg:w-[55%] flex-col justify-end p-16 overflow-hidden">
<!-- Background Image -->
<div class="absolute inset-0 z-0 bg-cover bg-center transition-transform duration-[10s] hover:scale-105 ease-out" data-alt="serene morning view of high altitude himalayan lake reflecting snow capped mountain peaks with soft cool misty lighting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBcA_7ULF3c7ZyUcJYR8USLcYGog9tL9FeMni-whwrlftF4zmn2mBYxdNXJlky_xc-tFuGKRrWvImCI6wv8WcQUX1ira4oSgenQK2DOhZK8lVDgfz0U87X9FYbEynnf9COGJ_VuoMy_AmNLtVvMqABDVvMbDejDZTN9oGsuHyz2oMCDEk-T10_KfnCTKau1Sy9hhyOXYilNHqhk6vkGAJjtr7Cd0p7pEZ4nsHd1Afg25TO7pW_AkLhBtaEuR6-zWuoupNTzWtplQ9S-');">
</div>
<!-- Tonal Gradient Overlay for Text Readability and Depth -->
<div class="absolute inset-0 z-10 bg-gradient-to-t from-surface via-surface/40 to-transparent"></div>
<!-- Content Container -->
<div class="relative z-20 max-w-xl pr-12">
<a class="inline-block mb-16 text-3xl font-headline font-extrabold tracking-tighter text-on-surface" href="#">Ghumuan</a>
<h1 class="font-headline text-5xl xl:text-6xl font-bold tracking-tight text-on-surface leading-[1.1] mb-6">
                    Join the community<br/>of explorers.
                </h1>
<p class="font-body text-xl text-on-surface-variant leading-relaxed max-w-md">
                    Discover the stillness of the Himalayas. Plan, save, and embark on journeys that elevate the soul.
                </p>
</div>
</div>
<!-- Right Side: Form Canvas -->
<div class="w-full lg:w-[45%] flex items-center justify-center p-6 sm:p-12 lg:p-16 relative bg-surface z-20">
<!-- Mobile Background Fallback & Tonal Shift -->
<div class="absolute inset-0 lg:hidden z-0 bg-cover bg-center opacity-40" data-alt="serene morning view of high altitude himalayan lake reflecting snow capped mountain peaks with soft cool misty lighting" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAk0SuII8rqIjID4v-zkcPo5k9HB1vGWYkixTIHhM45UjUyZrTVZQupLaWX8XfaYt12xP9TCJciLPuxEiEaYSME-_VpiqJ9d4f3s8-1dEsL22TYkPWIt--NDVE8gSR5vI5Nm0fluMqMoowcYYyFntJUBrY38coXfrFkXnvNQMaAK6r7_3YHB_hTLwU-HazHywht2M8kYXgh2WlQEPrxhngtTqUGUzjPkDlVEm37z8KaACntuc1BXYyWLbsIPsEBDcqXJDPFyz3nhJUF');">
</div>
<div class="absolute inset-0 lg:hidden z-0 bg-gradient-to-b from-surface/80 to-surface"></div>
<!-- Mobile Brand Logo -->
<div class="absolute top-8 left-8 z-30 lg:hidden">
<a class="text-2xl font-headline font-extrabold tracking-tighter text-on-surface" href="#">Ghumuan</a>
</div>
<!-- Glassmorphic Form Card -->
<div class="w-full max-w-md relative z-10 bg-surface/70 backdrop-blur-[20px] rounded-xl p-8 sm:p-10 shadow-[0_8px_40px_rgba(11,28,48,0.06)] border border-outline-variant/15">
<!-- Header -->
<div class="mb-10 text-center lg:text-left">
<h2 class="font-headline text-3xl font-bold text-on-surface tracking-tight mb-2">Create an account</h2>
<p class="font-body text-base text-on-surface-variant">Begin your journey to the peaks.</p>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant block" for="name">Full Name</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">person</span>
</span>
<input class="w-full bg-surface-container-low focus:bg-surface-container-lowest text-on-surface rounded-xl pl-11 pr-4 py-3.5 outline-none transition-all duration-300 border border-transparent focus:border-surface-tint focus:ring-0 focus:shadow-[0_0_0_2px_rgba(0,99,152,0.15)] placeholder:text-outline" id="name" name="name" placeholder="Tenzing Norgay" required="" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant block" for="email">Email Address</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</span>
<input class="w-full bg-surface-container-low focus:bg-surface-container-lowest text-on-surface rounded-xl pl-11 pr-4 py-3.5 outline-none transition-all duration-300 border border-transparent focus:border-surface-tint focus:ring-0 focus:shadow-[0_0_0_2px_rgba(0,99,152,0.15)] placeholder:text-outline" id="email" name="email" placeholder="explorer@nepal.com" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant block" for="password">Password</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</span>
<input class="w-full bg-surface-container-low focus:bg-surface-container-lowest text-on-surface rounded-xl pl-11 pr-11 py-3.5 outline-none transition-all duration-300 border border-transparent focus:border-surface-tint focus:ring-0 focus:shadow-[0_0_0_2px_rgba(0,99,152,0.15)] placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="font-label text-sm font-medium text-on-surface-variant block" for="confirm-password">Confirm Password</label>
<div class="relative group">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">verified_user</span>
</span>
<input class="w-full bg-surface-container-low focus:bg-surface-container-lowest text-on-surface rounded-xl pl-11 pr-4 py-3.5 outline-none transition-all duration-300 border border-transparent focus:border-surface-tint focus:ring-0 focus:shadow-[0_0_0_2px_rgba(0,99,152,0.15)] placeholder:text-outline" id="confirm-password" name="confirm-password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-outline-variant/50 text-primary focus:ring-primary focus:ring-offset-surface bg-surface-container-lowest cursor-pointer transition-colors" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body text-on-surface-variant cursor-pointer" for="terms">
                                I agree to the <a class="text-primary hover:text-primary-container font-medium underline underline-offset-4 decoration-primary/30 transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-container font-medium underline underline-offset-4 decoration-primary/30 transition-colors" href="#">Privacy Policy</a>.
                            </label>
</div>
</div>
<!-- Submit Action (Primary Gradient Button) -->
<div class="pt-4">
<button class="w-full flex items-center justify-center bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-full py-4 px-8 font-label text-base font-bold tracking-wide hover:shadow-[0_8px_30px_rgba(0,97,148,0.25)] hover:scale-[1.01] active:scale-[0.98] transition-all duration-300" type="submit">
                            Create Account
                            <span class="material-symbols-outlined ml-2 text-xl" style="font-variation-settings: 'wght' 400;">arrow_forward</span>
</button>
</div>
</form>
<!-- Alternate Sign In (Tertiary Action) -->
<div class="mt-8 text-center border-t border-outline-variant/15 pt-8">
<p class="font-body text-sm text-on-surface-variant">
                        Already wandering with us? 
                        <a class="font-label font-bold text-primary hover:text-primary-container transition-colors ml-1" href="#">Sign In</a>
</p>
</div>
</div>
</div>
</main>
</body></html>
